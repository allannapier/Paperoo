<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Paperoo</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body {
    height:100%;
    background:#0d0d1a;
    overscroll-behavior:none;
    touch-action:none;
    -webkit-user-select:none; user-select:none;
    -webkit-tap-highlight-color:transparent;
    font-family:'Courier New', monospace;
  }
  #app { display:flex; flex-direction:column; height:100dvh; }

  /* ---- game area (top ~75%) ---- */
  #gameArea { position:relative; flex:3 1 0; min-height:0; }
  #gameCanvas { position:absolute; inset:0; width:100%; height:100%; display:block; touch-action:none; }

  #overlay {
    position:absolute; inset:0; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:16px;
    background:rgba(8,8,24,0.72); color:#fff; text-align:center; cursor:pointer;
    padding:16px;
  }
  #overlay.hidden { display:none; }
  #logoImg { max-width:82%; max-height:40%; image-rendering:pixelated; }
  #overlayTitle { font-size:clamp(22px,6vw,44px); font-weight:bold; letter-spacing:2px;
    color:#ffd23f; text-shadow:3px 3px 0 #d1495b, 6px 6px 0 rgba(0,0,0,.5); }
  #overlayText { font-size:clamp(14px,3.5vw,20px); line-height:1.6; color:#cfd8ff; white-space:pre-line; }
  #overlayPrompt { font-size:clamp(15px,4vw,22px); color:#7bff9b; animation:blink 1.1s steps(2) infinite; }
  @keyframes blink { 50% { opacity:0.15; } }
  .hidden { display:none !important; }

  /* ---- character select screen ---- */
  #charSelect {
    position:absolute; inset:0; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:14px;
    background:rgba(8,8,24,0.88); color:#fff; text-align:center;
    padding:16px; overflow-y:auto;
  }
  #charSelectTitle {
    font-size:clamp(18px,4.5vw,28px); font-weight:bold; letter-spacing:2px;
    color:#ffd23f; text-shadow:2px 2px 0 #d1495b, 4px 4px 0 rgba(0,0,0,.5);
    flex:0 0 auto;
  }
  #charSelectGrid {
    display:grid; grid-template-columns:repeat(2, minmax(0,1fr));
    gap:12px; width:min(94%, 520px); flex:0 0 auto;
  }
  .charCard {
    display:flex; flex-direction:column; align-items:center; gap:4px;
    background:rgba(16,16,32,0.92); border:2px solid #34345c; border-radius:14px;
    padding:10px 8px; font-family:inherit; color:#fff; cursor:pointer;
  }
  .charCard:active { transform:translateY(2px); border-color:#7bd6ff; }
  .charThumb { height:90px; image-rendering:pixelated; object-fit:contain; pointer-events:none; }
  .charName { font-weight:bold; font-size:14px; letter-spacing:1px; color:#7bd6ff; }
  .charTag { font-size:11px; color:#9fa6d0; letter-spacing:1px; }
  .charDesc { font-size:11px; color:#cfd8ff; line-height:1.35; min-height:2.7em; }
  .charStats { display:flex; flex-direction:column; gap:2px; font-size:10px; color:#9fa6d0; width:100%; }
  .charStatRow { display:flex; justify-content:space-between; gap:6px; }
  .charPips { color:#7bff9b; letter-spacing:1px; }

  /* ---- leaderboard panel (game over) ---- */
  #lbPanel {
    width:min(88%, 340px); display:flex; flex-direction:column; gap:10px;
    background:rgba(16,16,32,0.92); border:2px solid #34345c; border-radius:14px;
    padding:14px; font-family:inherit;
  }
  #lbHeading { font-size:13px; letter-spacing:3px; color:#7bd6ff; }
  #nameRow { display:flex; gap:8px; }
  #nameInput {
    flex:1; min-width:0; background:#0b0b18; color:#fff; border:2px solid #34345c;
    border-radius:8px; padding:8px 10px; font-family:inherit; font-weight:bold;
    font-size:16px; letter-spacing:1px; text-transform:uppercase;
  }
  #nameInput:focus { outline:none; border-color:#7bd6ff; }
  #submitScoreBtn, #playAgainBtn, #changeRiderBtn {
    border:0; border-radius:8px; padding:9px 14px; font-family:inherit; font-weight:bold;
    font-size:14px; letter-spacing:1px; color:#fff; cursor:pointer;
    box-shadow:0 3px 0 rgba(0,0,0,.45);
  }
  #submitScoreBtn { background:#1fb57a; }
  #submitScoreBtn:disabled { background:#3a5c4c; cursor:default; }
  #postGameRow { display:flex; gap:8px; }
  #playAgainBtn { background:#d1495b; font-size:16px; padding:12px; flex:1.4; }
  #changeRiderBtn { background:#2c3a6b; font-size:13px; padding:12px 8px; flex:1; }
  #submitScoreBtn:active, #playAgainBtn:active, #changeRiderBtn:active {
    transform:translateY(2px); box-shadow:0 1px 0 rgba(0,0,0,.45);
  }
  #lbList {
    list-style:none; margin:0; padding:0; max-height:32vh; overflow-y:auto;
    font-size:14px; text-align:left;
  }
  #lbList li { display:flex; gap:8px; padding:3px 2px; color:#cfd8ff; white-space:pre; }
  #lbList li.you { color:#7bff9b; background:rgba(123,255,155,0.08); border-radius:4px; }
  #lbList .lbName { flex:1; overflow:hidden; text-overflow:ellipsis; }
  #lbList .lbScore { font-weight:bold; }

  /* ---- controller (bottom ~25%), styled like a gamepad deck ---- */
  #controls {
    flex:1 0 0; min-height:130px; display:flex; gap:14px; padding:12px 14px;
    padding-bottom:calc(12px + env(safe-area-inset-bottom));
    background:linear-gradient(#23233f 0%, #16162c 18%, #0b0b18 100%);
    border-top:2px solid #34345c; touch-action:none;
    align-items:stretch;
  }
  .cluster { flex:1; display:flex; flex-direction:column; gap:6px; min-width:0; }
  .clusterLabel { text-align:center; font-size:10px; letter-spacing:4px; color:#7d7db8; }
  .controlRow { flex:1; display:flex; align-items:center; justify-content:center; gap:14px; min-height:0; }

  .ctl { border:0; padding:0; color:#fff; touch-action:none; cursor:pointer;
    display:flex; align-items:center; justify-content:center; }
  .ctl svg { width:58%; height:58%; pointer-events:none; }

  /* steering rocker: one pill, two halves, hub in the middle */
  .dpad {
    display:flex; align-items:center; width:100%; max-width:280px; height:72%;
    max-height:88px; background:#101020; border-radius:999px; padding:5px;
    box-shadow:inset 0 3px 8px rgba(0,0,0,.7), 0 1px 0 rgba(255,255,255,.06);
    position:relative;
  }
  .steer {
    flex:1; height:100%;
    background:linear-gradient(#4a68e8, #2c46b4);
    box-shadow:0 4px 0 #1a2a70, inset 0 2px 0 rgba(255,255,255,.25);
  }
  #btnLeft  { border-radius:999px 8px 8px 999px; margin-right:2px; }
  #btnRight { border-radius:8px 999px 999px 8px; margin-left:2px; }
  .dpadHub {
    position:absolute; left:50%; top:50%; transform:translate(-50%,-50%);
    width:16px; height:16px; border-radius:50%;
    background:#101020; box-shadow:inset 0 2px 4px rgba(0,0,0,.8);
    pointer-events:none; z-index:1;
  }

  /* throw: round arcade face buttons */
  .throw {
    height:86%; max-height:96px; aspect-ratio:1/1; border-radius:50%;
    background:radial-gradient(circle at 35% 30%, #ef7186, #d1495b 55%, #9c2c40);
    box-shadow:0 5px 0 #6d1d2c, inset 0 3px 2px rgba(255,255,255,.35),
      0 0 0 5px #101020, 0 5px 0 5px #0a0a14;
  }
  .throw svg { width:64%; height:64%; }

  .ctl:active, .ctl.held { transform:translateY(4px); filter:brightness(1.2); }
  .steer:active, .steer.held { box-shadow:0 0 0 #1a2a70, inset 0 2px 6px rgba(0,0,0,.4); }
  .throw:active, .throw.held {
    box-shadow:0 1px 0 #6d1d2c, inset 0 3px 6px rgba(0,0,0,.35),
      0 0 0 5px #101020, 0 1px 0 5px #0a0a14;
  }
  .mirror { transform:scaleX(-1); }

  /* a subscriber house is lined up with the landing ring on this side */
  .throw.ready {
    animation:readyPulse .5s ease-in-out infinite alternate;
  }
  @keyframes readyPulse {
    from { filter:brightness(1); }
    to {
      filter:brightness(1.35);
      box-shadow:0 5px 0 #6d1d2c, inset 0 3px 2px rgba(255,255,255,.35),
        0 0 0 5px #2c7a45, 0 5px 0 5px #0a0a14, 0 0 22px 6px rgba(123,255,155,.6);
    }
  }
  @media (prefers-reduced-motion: reduce) {
    .throw.ready { animation:none; filter:brightness(1.3); }
  }
</style>
</head>
<body>
<div id="app">
  <div id="gameArea">
    <canvas id="gameCanvas"></canvas>
    <div id="overlay">
      <img id="logoImg" alt="Paperoo" src="" draggable="false">
      <div id="overlayTitle" style="display:none">PAPEROO</div>
      <div id="overlayText">Glowing house? That's a customer.
Throw when the ring turns green.
Mind the dogs. &#128054;</div>
      <div id="overlayPrompt">TAP TO CHOOSE YOUR RIDER</div>
      <div id="lbPanel" class="hidden">
        <div id="lbHeading">TOP SCORES</div>
        <div id="nameRow">
          <input id="nameInput" maxlength="12" placeholder="YOUR NAME" autocomplete="off" spellcheck="false">
          <button id="submitScoreBtn">SUBMIT</button>
        </div>
        <ol id="lbList"></ol>
        <div id="postGameRow">
          <button id="playAgainBtn">RIDE AGAIN</button>
          <button id="changeRiderBtn">CHANGE RIDER</button>
        </div>
      </div>
    </div>
    <div id="charSelect" class="hidden">
      <div id="charSelectTitle">CHOOSE YOUR RIDER</div>
      <div id="charSelectGrid"></div>
    </div>
  </div>
  <div id="controls">
    <div class="cluster">
      <div class="controlRow">
        <div class="dpad">
          <button class="ctl steer" id="btnLeft" aria-label="steer left">
            <svg viewBox="0 0 24 24"><path d="M14.5 4.5 7.5 12l7 7.5" stroke="#fff" stroke-width="3.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
          <div class="dpadHub"></div>
          <button class="ctl steer" id="btnRight" aria-label="steer right">
            <svg viewBox="0 0 24 24"><path d="M9.5 4.5 16.5 12l-7 7.5" stroke="#fff" stroke-width="3.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
        </div>
      </div>
      <div class="clusterLabel">STEER</div>
    </div>
    <div class="cluster">
      <div class="controlRow">
        <button class="ctl throw" id="btnThrowL" aria-label="throw paper left">
          <svg viewBox="0 0 36 36">
            <path d="M27.5 27.5Q27 13 13.5 10.5" stroke="#fff" stroke-width="3.2" fill="none" stroke-linecap="round"/>
            <path d="M19 5.5 11.5 10l6 6" stroke="#fff" stroke-width="3.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
            <rect x="23.5" y="23" width="7" height="10" rx="2.4" transform="rotate(-35 27 28)" fill="#ffe9b8" stroke="#8a6a30" stroke-width="1.4"/>
          </svg>
        </button>
        <button class="ctl throw" id="btnThrowR" aria-label="throw paper right">
          <svg class="mirror" viewBox="0 0 36 36">
            <path d="M27.5 27.5Q27 13 13.5 10.5" stroke="#fff" stroke-width="3.2" fill="none" stroke-linecap="round"/>
            <path d="M19 5.5 11.5 10l6 6" stroke="#fff" stroke-width="3.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
            <rect x="23.5" y="23" width="7" height="10" rx="2.4" transform="rotate(-35 27 28)" fill="#ffe9b8" stroke="#8a6a30" stroke-width="1.4"/>
          </svg>
        </button>
      </div>
      <div class="clusterLabel">THROW PAPER</div>
    </div>
  </div>
</div>
<script src="js/config.js"></script>
<script src="js/leaderboard.js"></script>
<script src="js/sprites.js"></script>
<script src="js/game.js"></script>
</body>
</html>
